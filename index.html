<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Личный Блог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="glass">
        <h1>Дневник</h1>
        <div class="toggle-container">
            <span id="mode-label">Просмотр</span>
            <label class="switch">
                <input type="checkbox" id="mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <main>
        <!-- Форма для добавления нового поста -->
        <div class="glass post-form">
            <textarea id="new-post-text" placeholder="О чем вы думаете?"></textarea>
            <div style="margin-top: 10px; text-align: right;">
                <button class="btn-primary" onclick="addPost()">Опубликовать</button>
            </div>
        </div>

        <!-- Контейнер для постов -->
        <div id="posts-container"></div>
    </main>

    <!-- Модальное окно ввода пароля -->
    <div class="modal-overlay" id="password-modal">
        <div class="glass modal">
            <h2>Режим редактирования</h2>
            <p>Введите кодовую фразу для доступа:</p>
            <input type="password" id="password-input" placeholder="Кодовая фраза">
            <div id="password-error" style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; display: none;">
                Неверная фраза!
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" style="background: rgba(255,255,255,0.1);" onclick="closePasswordModal()">Отмена</button>
                <button class="btn-primary" onclick="verifyPassword()">Войти</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
